{{- if .Values.dependencies.mongodb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aks-store.fullname" . }}-mongodb
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "aks-store.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb
  template:
    metadata:
      labels:
        {{- include "aks-store.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.dependencies.mongodb.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aks-store.fullname" . }}-mongodb
  labels:
    {{- include "aks-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  type: ClusterIP
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
  selector:
    {{- include "aks-store.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
{{- end }}
