apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: backend-bundle
  namespace: aks-store-health-gate
spec:
  freightCreationPolicy: Automatic
  subscriptions:
    - image:
        repoURL: ghcr.io/chriskealerant/kargo-demo-product-service
        imageSelectionStrategy: SemVer
        allowTagsRegexes:
          - ^v[0-9]+\.[0-9]+\.[0-9]+$
        strictSemvers: true
        cacheByTag: true
    - image:
        repoURL: ghcr.io/chriskealerant/kargo-demo-order-service
        imageSelectionStrategy: SemVer
        allowTagsRegexes:
          - ^v[0-9]+\.[0-9]+\.[0-9]+$
        strictSemvers: true
        cacheByTag: true
  # Backend services are bundled: they must move together with the same tag.
  freightCreationCriteria:
    expression: |
      imageFrom('ghcr.io/chriskealerant/kargo-demo-product-service').Tag == imageFrom('ghcr.io/chriskealerant/kargo-demo-order-service').Tag
