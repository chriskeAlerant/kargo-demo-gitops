apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: intentionally-failing-health-check
  namespace: aks-store-health-gate
spec:
  args:
    - name: health-url
  metrics:
    - name: health-check
      count: 1
      failureLimit: 0
      provider:
        job:
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: curl
                    image: curlimages/curl:8.10.1
                    command:
                      - sh
                      - -c
                      - |
                        curl -fsS --max-time 5 "{{ args.health-url }}"
