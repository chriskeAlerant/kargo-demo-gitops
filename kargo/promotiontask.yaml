apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-frontend
  namespace: aks-store
spec:
  vars:
    - name: gitRepo
      value: https://github.com/chriskeAlerant/kargo-demo-gitops.git
    - name: targetBranch
      value: main
    - name: storeFrontImageRepo
      value: ghcr.io/chriskealerant/kargo-demo-store-front
  steps:
    - uses: git-clone
      as: clone
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - branch: ${{ vars.targetBranch }}
            path: ./repo
        author:
          name: kargo
          email: kargo@example.invalid

    - uses: yaml-update
      as: update-frontend-tag
      config:
        path: ./repo/environments/${{ vars.targetEnv }}/values.yaml
        updates:
          - key: images.storeFront.tag
            value: ${{ imageFrom(vars.storeFrontImageRepo, warehouse('frontend')).Tag }}

    - uses: git-commit
      as: commit
      config:
        path: ./repo
        message: |
          promote frontend ${{ imageFrom(vars.storeFrontImageRepo, warehouse('frontend')).Tag }} to ${{ vars.targetEnv }}

          ${{ task.outputs['update-frontend-tag'].commitMessage }}

    - uses: git-push
      as: push
      config:
        path: ./repo
        targetBranch: ${{ vars.targetBranch }}

    - uses: argocd-update
      as: refresh-argocd
      config:
        apps:
          - name: ${{ vars.argocdApp }}
            sources:
              - repoURL: ${{ vars.gitRepo }}
                desiredRevision: ${{ task.outputs['commit'].commit }}
                updateTargetRevision: false
---
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-backend-bundle
  namespace: aks-store
spec:
  vars:
    - name: gitRepo
      value: https://github.com/chriskeAlerant/kargo-demo-gitops.git
    - name: targetBranch
      value: main
    - name: productServiceImageRepo
      value: ghcr.io/chriskealerant/kargo-demo-product-service
    - name: orderServiceImageRepo
      value: ghcr.io/chriskealerant/kargo-demo-order-service
  steps:
    - uses: git-clone
      as: clone
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - branch: ${{ vars.targetBranch }}
            path: ./repo
        author:
          name: kargo
          email: kargo@example.invalid

    - uses: yaml-update
      as: update-backend-tags
      config:
        path: ./repo/environments/${{ vars.targetEnv }}/values.yaml
        updates:
          - key: images.productService.tag
            value: ${{ imageFrom(vars.productServiceImageRepo, warehouse('backend-bundle')).Tag }}
          - key: images.orderService.tag
