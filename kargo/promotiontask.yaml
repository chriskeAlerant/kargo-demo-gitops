    - uses: git-commit
      as: commit
      config:
        path: ./repo
        message: |
          promote backend bundle ${{ imageFrom(vars.productServiceImageRepo, warehouse('backend-bundle')).Tag }} to ${{ vars.targetEnv }}

          ${{ task.outputs['update-backend-tags'].commitMessage }}

    - uses: git-push
      as: push
      config:
        path: ./repo
        targetBranch: ${{ vars.targetBranch }}

    - uses: argocd-update
      as: refresh-argocd
      config:
        apps:
          - name: ${{ vars.argocdApp }}
            sources:
