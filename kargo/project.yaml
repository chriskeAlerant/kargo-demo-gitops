# apiVersion: v1
# kind: Namespace
# metadata:
#   name: aks-store
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: aks-store
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: aks-store
  namespace: aks-store
spec:
  promotionPolicies:
    - stageSelector:
        name: dev
      autoPromotionEnabled: true
    - stageSelector:
        name: test
      autoPromotionEnabled: false
    - stageSelector:
        name: prod
      autoPromotionEnabled: false
