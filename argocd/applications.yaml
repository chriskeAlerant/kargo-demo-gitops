apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aks-store-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aks-store
    environment: dev
  annotations:
    # Kargo currently documents one authorized-stage value per Argo CD Application.
    # For the backend-dev argocd-update path, switch this value to aks-store:backend-dev
    # or use a Kargo version/pattern that explicitly supports multiple authorized stages.
    kargo.akuity.io/authorized-stage: aks-store:frontend-dev
spec:
  project: default
  source:
    repoURL: https://github.com/chriskeAlerant/kargo-demo-gitops.git
    targetRevision: main
    path: charts/aks-store
    helm:
      releaseName: aks-store
      valueFiles:
        - ../../environments/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aks-store-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
